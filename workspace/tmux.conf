set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g default-terminal 'tmux-256color'
set -as terminal-features ',xterm-ghostty:RGB,xterm-kitty:RGB,wezterm:RGB,alacritty:RGB,foot:RGB,*-direct:RGB'
set -g renumber-windows on
set -g status-interval 5
set -g status-style 'bg=colour236,fg=colour250'
set -g status-left '#[fg=colour75,bold] devbox #[default] '
set -g status-right '#[fg=colour245]%Y-%m-%d %H:%M #[default]'
setw -g mode-keys vi
