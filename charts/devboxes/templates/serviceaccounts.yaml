apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devboxes.controllerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devboxes.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
automountServiceAccountToken: true
{{- if .Values.workspace.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devboxes.workspaceServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devboxes.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
  {{- with .Values.workspace.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
