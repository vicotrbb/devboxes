name: Feature request
description: Propose a focused improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: I considered persistence, security, and Kubernetes portability.
          required: true
